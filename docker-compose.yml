version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: ./ml-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ml-backend:/app
      - ml_data:/app/data
    environment:
      - WHISPER_MODEL=base
      - MODEL_DIR=/app/data/models
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ml_data:
